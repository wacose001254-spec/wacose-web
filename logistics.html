<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACOSE | Logistics Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panel: '#0a0f1a', surface: '#020617', accent: '#3b82f6', 'border-ghost': 'rgba(255,255,255,0.06)' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { 
            background: linear-gradient(to bottom, rgba(2, 6, 23, 0.9), #020617), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-attachment: fixed; background-position: center; color: #94a3b8;
        }
        .glass-panel { background: rgba(10, 15, 26, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); }
        .modal-overlay { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="antialiased font-sans">

    <nav class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center border-b border-border-ghost relative z-10">
        <a href="index.html" class="text-[10px] font-bold uppercase tracking-[0.2em] hover:text-accent flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2.5"/></svg> Back
        </a>
        <div class="flex gap-6 text-[11px] font-bold uppercase tracking-widest">
            <a href="about.html" class="hover:text-white">About</a>
            <a href="studio.html" class="hover:text-white">Studio</a>
            <a href="contact.html" class="text-accent">Contact</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12 relative z-10">
        <header class="mb-12">
            <h1 class="text-6xl font-extrabold text-white tracking-tighter mb-4 italic">Operations<span class="text-accent">.</span></h1>
            <p class="text-slate-300 max-w-2xl text-lg font-light">High-fidelity dispatch control and real-time fleet synchronization.</p>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <div class="col-span-12 lg:col-span-8 glass-panel rounded-[2rem] p-10">
                <h3 class="text-white font-bold text-xl mb-8 flex items-center gap-3 italic"><span id="status-light" class="w-3 h-3 bg-slate-700 rounded-full"></span> Fleet Access Terminal</h3>
                <div class="flex flex-col md:flex-row gap-3 mb-8">
                    <input type="text" id="track-input" placeholder="CONSIGNMENT ID" class="flex-grow bg-surface/50 border border-border-ghost rounded-2xl px-6 py-4 text-sm font-mono focus:border-accent text-white uppercase outline-none">
                    <button onclick="simulateTrack()" class="bg-accent text-white px-10 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:brightness-110 active:scale-95 transition-all">Initialize</button>
                </div>
                <div id="terminal-output" class="hidden glass-panel bg-black/40 rounded-2xl p-6 font-mono text-[11px] h-64 flex flex-col">
                    <div class="w-full h-[1px] bg-white/10 mb-6 overflow-hidden"><div id="progress-bar" class="w-0 h-full bg-accent transition-all duration-700"></div></div>
                    <div id="logs" class="space-y-2 text-slate-500 overflow-y-auto"></div>
                </div>
                <div id="terminal-placeholder" class="h-64 bg-surface/20 rounded-2xl border border-dashed border-slate-800 flex items-center justify-center italic text-[10px] uppercase tracking-widest opacity-30">Waiting for Handshake...</div>
            </div>

            <div class="col-span-12 lg:col-span-4">
                <div onclick="toggleModal(true)" class="bg-accent rounded-[2rem] p-8 h-full group cursor-pointer relative overflow-hidden flex flex-col justify-between">
                    <div class="relative z-10 text-white"><h4 class="font-black text-2xl italic uppercase leading-none mb-3">Instant<br/>Dispatch</h4><p class="text-white/70 text-xs">Deploy a dedicated rider node via WhatsApp instantly.</p></div>
                    <span class="relative z-10 text-white font-bold text-[10px] uppercase tracking-widest flex items-center gap-2 group-hover:gap-4 transition-all">Launch Protocol <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m4-4H3" stroke-width="2.5"/></svg></span>
                    <svg class="absolute -right-6 -bottom-6 w-32 h-32 text-white/10" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                </div>
            </div>
        </div>
    </main>

    <div id="dispatch-modal" class="hidden fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6">
        <div class="glass-panel w-full max-w-md rounded-[2.5rem] p-10 relative">
            <button onclick="toggleModal(false)" class="absolute top-8 right-8 text-slate-500 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg></button>
            <h2 class="text-white font-black text-xl uppercase italic mb-8">Deploy Rider</h2>
            <div class="space-y-4">
                <input type="text" id="client-name" placeholder="CLIENT NAME" class="w-full bg-surface border border-border-ghost rounded-xl p-4 text-white text-xs font-mono outline-none">
                <input type="text" id="pickup-point" placeholder="PICKUP" class="w-full bg-surface border border-border-ghost rounded-xl p-4 text-white text-xs font-mono outline-none">
                <input type="text" id="dest-point" placeholder="DESTINATION" class="w-full bg-surface border border-border-ghost rounded-xl p-4 text-white text-xs font-mono outline-none">
                <button onclick="processDispatch()" class="w-full bg-white text-black font-black py-4 rounded-xl text-[10px] tracking-widest uppercase hover:bg-accent hover:text-white transition-all">Establish Connection</button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "2547XXXXXXXX"; 
        window.onload = () => {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) { document.getElementById('track-input').value = id; simulateTrack(); }
        };
        function toggleModal(show) { document.getElementById('dispatch-modal').classList.toggle('hidden', !show); }
        function processDispatch() {
            const client = document.getElementById('client-name').value;
            const pickup = document.getElementById('pickup-point').value;
            const dest = document.getElementById('dest-point').value;
            if (!client || !pickup || !dest) return alert("Fill all fields.");
            const dID = "WC-" + Math.floor(1000 + Math.random() * 9000);
            const logs = JSON.parse(localStorage.getItem('wacose_logs') || '[]');
            logs.unshift({ id: dID, client, route: `${pickup} > ${dest}`, time: new Date().toLocaleTimeString() });
            localStorage.setItem('wacose_logs', JSON.stringify(logs.slice(0, 10)));
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=WACOSE: ${client} | Route: ${pickup} to ${dest}`, '_blank');
            toggleModal(false);
        }
        function simulateTrack() {
            const id = document.getElementById('track-input').value.trim();
            if (!id) return;
            const out = document.getElementById('terminal-output');
            const placeholder = document.getElementById('terminal-placeholder');
            const logs = document.getElementById('logs');
            const bar = document.getElementById('progress-bar');
            const light = document.getElementById('status-light');
            placeholder.classList.add('hidden'); out.classList.remove('hidden'); logs.innerHTML = ''; bar.style.width = '0%'; light.className = 'w-3 h-3 bg-yellow-500 animate-pulse rounded-full';
            const msgs = [`> INITIALIZING...`, `> LOCATING ${id.toUpperCase()}...`, `> SUCCESS: NODE_04`, `> ETA: 12 MIN.`];
            msgs.forEach((m, i) => { setTimeout(() => {
                const p = document.createElement('p'); p.innerHTML = `<span class="opacity-30 mr-2">[${new Date().toLocaleTimeString()}]</span> ${m}`;
                if (i === 2) p.className = 'text-accent'; logs.appendChild(p); bar.style.width = `${((i + 1) / msgs.length) * 100}%`;
                if (i === msgs.length - 1) light.className = 'w-3 h-3 bg-accent rounded-full';
            }, i * 800); });
        }
    </script>
</body>
</html>
